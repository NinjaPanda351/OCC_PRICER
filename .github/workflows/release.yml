name: Build & Release

on:
  push:
    tags:
      - 'v*'          # trigger on tags like v2.0.7, v2.1.0, etc.

permissions:
  contents: write    # needed to create GitHub Releases

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"          # e.g. v2.0.7
          VERSION="${TAG#v}"                # strip leading 'v' → 2.0.7
          echo "tag=$TAG"       >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build release archive
        shell: pwsh
        run: |
          .\build.ps1 -Version "${{ steps.version.outputs.version }}"

      - name: Locate ZIP artifact
        id: find_zip
        shell: bash
        run: |
          ZIP=$(ls dist/OCC_Card_Pricer_V*.zip | head -1)
          echo "zip_path=$ZIP" >> "$GITHUB_OUTPUT"
          echo "Found: $ZIP"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "OCC Card Pricer ${{ steps.version.outputs.tag }}"
          body: |
            ## OCC Card Pricer ${{ steps.version.outputs.tag }}

            ### Installation
            1. Download `OCC_Card_Pricer_V${{ steps.version.outputs.version }}.zip` below
            2. Extract the ZIP to a folder of your choice
            3. Run `OCC Card Pricer.exe` inside the extracted folder

            > The app will notify you automatically when a newer version is available.
          files: ${{ steps.find_zip.outputs.zip_path }}
          draft: false
          prerelease: false
